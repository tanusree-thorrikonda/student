{% extends "base.html" %}

{% block title %}Admin Sign In | EduPulse{% endblock %}

{% block content %}
<div class="form-container-wrapper" style="max-width: 450px; margin: 40px auto;">
    <div class="data-card form-card shadow-card">
        <div class="card-header" style="text-align: center; border-bottom: none; padding-bottom: 0;">
            <div class="empty-icon" style="font-size: 48px; color: var(--primary); margin-bottom: 12px; opacity: 1;">
                <i class="fa-solid fa-user-lock"></i>
            </div>
            <h2>Admin Sign In</h2>
            <p class="subtitle">Please sign in to access the student directory</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST" class="interactive-form" style="padding-top: 20px;">
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" 
                       placeholder="Enter admin username" 
                       value="{{ username or '' }}" required autocomplete="off">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password"><i class="fa-solid fa-key"></i> Password</label>
                <input type="password" id="password" name="password" 
                       placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-bottom: 20px;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
            
            <div style="text-align: center; font-size: 13px; color: var(--text-muted);">
                Don't have an admin account? 
                <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 600; text-decoration: underline;">
                    Register here
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
